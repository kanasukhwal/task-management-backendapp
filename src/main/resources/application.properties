spring.application.name=task-management-backend
# Use the PORT environment variable when available (Render/Heroku style),
# otherwise fall back to 8080 for local development.
server.port=${PORT:8080}

# Jackson - serialize dates in ISO format
spring.jackson.serialization.write-dates-as-timestamps=false

# Show concise startup logs
logging.level.org.springframework.web=INFO
